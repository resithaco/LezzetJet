<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" width="100%" height="100%" style="border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); background-color: #00AEEF;">
  <defs>
    <style>
      .small-text { font-family: Arial, sans-serif; font-size: 14px; fill: #111; }
      .contact-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #111; }
    </style>
  </defs>

  <rect x="0" y="80" width="856" height="100" fill="#B0B0B3" />

  <g transform="translate(40, 25)">
    <rect x="0" y="0" width="20" height="20" rx="4" fill="#F05023" transform="rotate(15 10 10)" />
    <path d="M4 6 L10 16 L16 6 L13 6 L10 12 L7 6 Z" fill="#FFFFFF" />
    <text x="28" y="16" class="contact-text" font-size="18">VakıfBank</text>
  </g>

  <g transform="translate(250, 20)" fill="#E0E0E0" stroke="#FFFFFF" stroke-width="1">
    <path d="M 20 20 Q 30 10 40 25 Q 50 15 60 20 Q 50 35 30 40 Z" />
    <path d="M 30 20 Q 15 15 10 30 Q 20 25 30 30 Z" />
  </g>

  <text x="40" y="220" class="small-text" font-weight="bold">• Başkasına devredilemez. | Non transferable.</text>
  <text x="40" y="245" class="small-text">• Bu kartın mülkiyeti T.VAKIFLAR BANKASI T.A.O.'ya aittir ve</text>
  <text x="50" y="265" class="small-text">istenildiğinde iade edilmesi zorunludur. | This card is</text>
  <text x="50" y="285" class="small-text">the property of T.VAKIFLAR BANKASI T.A.O.</text>

  <rect x="420" y="280" width="120" height="50" fill="#FFFFFF" rx="5" />
  <text x="440" y="315" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="bold"></text>
  <text x="420" y="260" class="small-text" font-weight="bold">SECURITY</text>
  <text x="420" y="275" class="small-text" font-weight="bold">CODE</text>

  <g transform="translate(40, 360)">
    <rect x="0" y="0" width="100" height="100" fill="#FFFFFF" rx="5" />
    <rect x="10" y="10" width="80" height="80" fill="#111" />
    <rect x="15" y="15" width="70" height="70" fill="#FFF" />
    <rect x="20" y="20" width="15" height="15" fill="#111" />
    <rect x="65" y="20" width="15" height="15" fill="#111" />
    <rect x="20" y="65" width="15" height="15" fill="#111" />
    <rect x="45" y="45" width="20" height="20" fill="#111" />
  </g>

  <g transform="translate(800, 200) rotate(90)">
    <text x="0" y="0" class="contact-text">www.vakifkart.com.tr | 444 0 724</text>
  </g>
  
  <text x="420" y="420" class="small-text" font-weight="bold">MSP INDIA 0 1408 03/24</text>
